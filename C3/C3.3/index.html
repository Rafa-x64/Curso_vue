<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> </title>
    <!--bootstrap-->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!--vue-->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>

  <!--codigo-->
  <body id="app">
    <div class="row">
      <div class="col-2" v-for="servidor in servidores">
        <div
          class="card border"
          :class="{'border-danger': servidor.estado == 'offline', 'border-success': servidor.estado == 'online'}"
        >
          <div
            class="card-header"
            :class="{'text-muted': servidor.estado == 'offline'}"
          >
            {{servidor.nombre}}
          </div>
          <div class="card-body">{{servidor.estado}}</div>
          <div class="card-footer">
            <div class="badge" v-if="servidor.estado == 'online'">
              <p>✅</p>
            </div>
            <div class="badge" v-else>
              <p>❌</p>
            </div>
          </div>
        </div>
        <button @click="cambiar(servidor)" class="btn">Cambiar estado</button>
      </div>
    </div>
  </body>

  <!--mas bootstrap-->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"
  ></script>
  <!--vue-->
  <script>
    Vue.createApp({
      data() {
        return {
          servidores: [
            {
              nombre: "serv1",
              estado: "online",
            },
            {
              nombre: "serv2",
              estado: "offline",
            },
            {
              nombre: "serv3",
              estado: "online",
            },
          ],
        };
      },

      methods: {
        cambiar(servidor) {
          if (servidor.estado == "offline") {
            servidor.estado = "online";
          } else {
            servidor.estado = "offline";
          }
        },
      },
    }).mount("#app");
  </script>
</html>
