<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootrap</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body id="app">
    <div class="container-fluid">
      <div
        class="row d-flex flex-row justify-content-center align-items-center"
      >
        <div class="col-6">
          <h1>Registro de arquitectos VIP</h1>
          <form action="" @submit.prevent="procesarFormulario">
            
            <input
              type="text"
              v-model="nombre"
              :class="{ 
              'is-valid': nombre.trim().length > 3, 
              'is-invalid': nombre.trim().length <= 3 && nombre.trim().length > 0 
              }"
              class="form-control"
            />

            <input type="text" v-model="especialidad" class="form-control" />

            <input
              type="text"
              v-model="experiencia"
              :class="experiencia > 0 ? 'is-valid' : 'is-invaid'"
              class="form-control"
            />

            <button class="btn">Registrar</button>
          </form>
        </div>
      </div>
    </div>
  </body>

  <script>
    Vue.createApp({
      data() {
        return {
          nombre: "",
          especialidad: "",
          experiencia: 0,
        };
      },

      methods: {
        procesarFormulario() {
          console.log(`
          ${this.nombre}
          ${this.especialidad}
          ${this.experiencia}

          `);
        },
      },
    }).mount("#app");
  </script>
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx"
  ></script>
</html>
