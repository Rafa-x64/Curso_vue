<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>If else</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      <div v-if="estaLogueado === true">
        <h1>Bienvenido usuario</h1>
        <button @click="alternar()">Cerrar Sesion</button>
      </div>

      <div v-else>
        <form action="" @prevent.submit>
          <input type="text" name="nombre" id="nombre" placeholder="nombre usuario">
          <input type="text" name="contraseña" id="contraseña" placeholder="contraseña usuario">
        </form>
        <button @click="alternar">Iniciar Sesion</button>
      </div>

    </div>
  </body>
  <script>
    Vue.createApp({
      data() {
        return {
          estaLogueado: true,
        };
      },

      //funciones
      methods: {
        alternar(){
          if(this.estaLogueado == true){
            this.estaLogueado = false;
          }else{
            this.estaLogueado = true;
          }
        }
      }
    }).mount("#app");
  </script>
</html>
